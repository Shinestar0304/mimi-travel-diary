<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星际许愿馆 | 互动星空留言墙</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", Microsoft YaHei, sans-serif;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000010;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* 顶部提示文字 */
        .top-tip {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: rgba(255,255,255,0.55);
            font-size: 14px;
            letter-spacing: 1px;
        }
        /* 侧边功能面板 */
        .side-panel {
            position: fixed;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            z-index: 10;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .side-panel button {
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.12);
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }
        .side-panel button:hover {
            background: rgba(255,255,255,0.25);
        }
        /* 底部许愿输入框 */
        .wish-input-box {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        #wishInput {
            width: 440px;
            padding: 13px 20px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(8px);
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        #wishInput::placeholder {
            color: rgba(255,255,255,0.42);
        }
        #submitWish {
            padding: 13px 26px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(120deg,#6366f1,#ec4899);
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.25s;
        }
        #submitWish:hover {
            transform: scale(1.04);
        }
        /* 漂浮心愿卡片 */
        .wish-card {
            position: absolute;
            color: #fff;
            font-size: 15px;
            padding: 6px 12px;
            background: rgba(255,255,255,0.06);
            border-radius: 10px;
            backdrop-filter: blur(4px);
            opacity: 0.78;
            white-space: nowrap;
            animation: float 14s ease-in-out infinite;
            cursor: move;
            user-select: none;
            z-index: 5;
        }
        .wish-card .del {
            margin-left: 8px;
            color: #ff8888;
            cursor: pointer;
        }
        @keyframes float {
            0% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-100px) rotate(4deg); }
            100% { transform: translateY(0) rotate(-3deg); }
        }
        /* 弹窗提示 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 99;
        }
        .modal-content {
            background: #111428;
            padding: 30px 40px;
            border-radius: 16px;
            color: #fff;
            text-align: center;
        }
        .modal-content p {
            margin-bottom: 20px;
            font-size: 18px;
        }
        .modal-content button {
            padding: 9px 24px;
            border: none;
            border-radius: 8px;
            background: #7c3aed;
            color: white;
            cursor: pointer;
        }
        /* 底部访问计时 */
        .time-count {
            position: fixed;
            bottom: 10px;
            right: 20px;
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            z-index: 10;
        }
    </style>
</head>
<body>
<canvas id="starCanvas"></canvas>

<div class="top-tip">单击屏幕生成流星｜双击召唤金色彗星｜写下心愿自动保存</div>

<!-- 侧边功能栏 -->
<div class="side-panel">
    <button id="randomText">随机一句文案</button>
    <button id="changeBg">切换星空背景</button>
    <button id="clearAllWish">清空全部心愿</button>
    <button id="copyLink">复制页面链接</button>
    <button id="toggleDark">切换深空模式</button>
</div>

<!-- 底部输入区 -->
<div class="wish-input-box">
    <input type="text" id="wishInput" placeholder="输入你的心愿，向星空许愿...">
    <button id="submitWish">许下心愿</button>
</div>

<!-- 弹窗 -->
<div class="modal" id="tipModal">
    <div class="modal-content">
        <p id="modalText">许愿成功！</p>
        <button id="closeModal">确定</button>
    </div>
</div>

<div class="time-count" id="visitTime">停留时长：00:00</div>
